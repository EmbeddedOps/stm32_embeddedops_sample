name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Ceedling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Ceedling
        run: gem install ceedling --no-document

      - name: Run tests
        run: ceedling test:all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build_test/artifacts/

  build:
    name: Firmware Build (ARM GCC)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi-gcc.cmake
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/stm32_temp_logger.elf
            build/stm32_temp_logger.hex
            build/stm32_temp_logger.bin
            build/stm32_temp_logger.map

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            stm32_temp_logger.elf
            stm32_temp_logger.hex
            stm32_temp_logger.bin
          generate_release_notes: true
