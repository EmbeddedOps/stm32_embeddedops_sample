name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  packages: write
  contents: write

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/embeddedops/stm32_embeddedops_sample:latest
            ghcr.io/embeddedops/stm32_embeddedops_sample:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Unit Tests (Ceedling)
    needs: docker
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/embeddedops/stm32_embeddedops_sample:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: ceedling test:all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build_test/artifacts/

  build:
    name: Firmware Build (ARM GCC)
    needs: [docker, test]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/embeddedops/stm32_embeddedops_sample:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi-gcc.cmake
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/stm32_temp_logger.elf
            build/stm32_temp_logger.hex
            build/stm32_temp_logger.bin
            build/stm32_temp_logger.map

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            stm32_temp_logger.elf
            stm32_temp_logger.hex
            stm32_temp_logger.bin
          generate_release_notes: true
